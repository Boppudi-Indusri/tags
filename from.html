<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET and POST Form Example</title>
</head>
<body>

```
<h1>HTML Forms Using GET and POST Methods</h1>

<h2>GET Method Form</h2>
<form action="submit.html" method="get">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name"><br><br>

    <label for="city">City:</label>
    <input type="text" id="city" name="city"><br><br>

    <input type="submit" value="Submit with GET">
</form>

<hr>

<h2>POST Method Form</h2>
<form action="submit.html" method="post">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username"><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password"><br><br>

    <input type="submit" value="Submit with POST">
     <!-- Radio Buttons -->
        <label>Gender *</label>
        <div class="inline-group">
            <label>
                <input type="radio" name="gender" value="Male" required>
                Male
            </label>

            <label>
                <input type="radio" name="gender" value="Female">
                Female
            </label>

            <label>
                <input type="radio" name="gender" value="Other">
                Other
            </label>
        </div>

        <!-- Checkbox -->
        <label>Interests *</label>
        <div class="inline-group">
            <label>
                <input type="checkbox" name="interest" value="Coding" required>
                Coding
            </label>

            <label>
                <input type="checkbox" name="interest" value="Reading">
                Reading
            </label>

            <label>
                <input type="checkbox" name="interest" value="Sports">
                Sports
            </label>
        </div>

        <!-- Range -->
        <label for="experience">
            Experience Level (0-10)
        </label>
        <input type="range"
               id="experience"
               name="experience"
               min="0"
               max="10"
               value="5">

        <!-- Color -->
        <label for="favcolor">
            Favorite Theme Color
        </label>
        <input type="color"
               id="favcolor"
               name="favcolor"
               value="#0077cc">

        <!-- Buttons -->
        <div class="buttons">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

</form>
```

</body>
</html>
